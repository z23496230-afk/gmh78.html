<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Space Battle PRO</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at 30% 30%, #1b2735, #090a0f 70%);
}
canvas{display:block;}
#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    font-size:18px;
}
</style>
</head>
<body>
<div id="ui">
HP: <span id="hp">5</span><br>
Оружие: <span id="weapon">1</span> (1-5)
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let keys = {};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let explosions = [];

const player = {
    x: canvas.width/2,
    y: canvas.height-120,
    hits: 5,
    weapon:1
};

// ⭐ Звезды
let stars=[];
for(let i=0;i<300;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2
    });
}

function drawStars(){
    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    });
}

// 🌍 Планеты
function drawPlanets(){
    let earth = ctx.createRadialGradient(150,150,10,150,150,80);
    earth.addColorStop(0,"#4fc3f7");
    earth.addColorStop(1,"#1a237e");
    ctx.fillStyle=earth;
    ctx.beginPath();
    ctx.arc(150,150,80,0,Math.PI*2);
    ctx.fill();

    let jupiter = ctx.createRadialGradient(canvas.width-200,200,20,canvas.width-200,200,120);
    jupiter.addColorStop(0,"#ffcc80");
    jupiter.addColorStop(1,"#8d6e63");
    ctx.fillStyle=jupiter;
    ctx.beginPath();
    ctx.arc(canvas.width-200,200,120,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#ccc";
    ctx.beginPath();
    ctx.arc(canvas.width/2,100,40,0,Math.PI*2);
    ctx.fill();
}

// ✈️ Игрок
function drawPlayer(){
    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x-20, player.y+50);
    ctx.lineTo(player.x+20, player.y+50);
    ctx.closePath();
    ctx.fill();
}

// 🔴 Враги
function spawnEnemy(){
    enemies.push({
        x:Math.random()*canvas.width,
        y:-50,
        hp:3,
        shootTimer:0
    });
}

function drawEnemies(){
    enemies.forEach((e,i)=>{
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.moveTo(e.x, e.y);
        ctx.lineTo(e.x-20, e.y+50);
        ctx.lineTo(e.x+20, e.y+50);
        ctx.closePath();
        ctx.fill();
        e.y+=2;

        e.shootTimer++;
        if(e.shootTimer>100){
            enemyBullets.push({x:e.x,y:e.y,dy:4});
            e.shootTimer=0;
        }

        if(e.y>canvas.height) enemies.splice(i,1);
    });
}

// 🔫 Стрельба игрока
function shoot(){
    if(player.weapon===1){ // 3 попадания
        bullets.push({x:player.x,y:player.y,dy:-7,damage:1,color:"yellow"});
    }
    if(player.weapon===2){ // 2 попадания
        bullets.push({x:player.x,y:player.y,dy:-8,damage:2,color:"lime"});
    }
    if(player.weapon===3){ // 1 попадание
        bullets.push({x:player.x,y:player.y,dy:-9,damage:3,color:"white"});
    }
    if(player.weapon===4){ // 2 пули
        bullets.push({x:player.x-10,y:player.y,dy:-8,damage:2,color:"cyan"});
        bullets.push({x:player.x+10,y:player.y,dy:-8,damage:2,color:"cyan"});
    }
    if(player.weapon===5){ // 100 пуль
        for(let i=0;i<100;i++){
            bullets.push({
                x:player.x + (Math.random()*40-20),
                y:player.y,
                dy:- (5+Math.random()*5),
                damage:1,
                color:"orange"
            });
        }
    }
}

function drawBullets(){
    bullets.forEach((b,i)=>{
        ctx.fillStyle=b.color;
        ctx.fillRect(b.x-2,b.y,4,12);
        b.y+=b.dy;

        enemies.forEach((e,ei)=>{
            if(Math.abs(b.x-e.x)<25 && Math.abs(b.y-e.y)<40){
                e.hp-=b.damage;
                bullets.splice(i,1);
                if(e.hp<=0){
                    createExplosion(e.x,e.y);
                    enemies.splice(ei,1);
                }
            }
        });
    });
}

// 🔴 Пули врагов
function drawEnemyBullets(){
    enemyBullets.forEach((b,i)=>{
        ctx.fillStyle="red";
        ctx.fillRect(b.x-3,b.y,6,12);
        b.y+=b.dy;

        if(Math.abs(b.x-player.x)<25 && Math.abs(b.y-player.y)<40){
            player.hits--;
            enemyBullets.splice(i,1);
            if(player.hits<=0){
                alert("💀 Ты проиграл!");
                location.reload();
            }
        }
    });
}

// 💥 Взрыв
function createExplosion(x,y){
    explosions.push({x,y,r:10});
}
function drawExplosions(){
    explosions.forEach((ex,i)=>{
        ctx.fillStyle="orange";
        ctx.beginPath();
        ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2);
        ctx.fill();
        ex.r+=3;
        if(ex.r>40) explosions.splice(i,1);
    });
}

// 🎮 Управление
addEventListener("keydown",e=>{
    keys[e.key]=true;
    if(e.key===" ") shoot();
    if(["1","2","3","4","5"].includes(e.key)) player.weapon=Number(e.key);
});
addEventListener("keyup",e=>keys[e.key]=false);

// 🔄 Игровой цикл
function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawStars();
    drawPlanets();

    if(keys["ArrowLeft"]) player.x-=6;
    if(keys["ArrowRight"]) player.x+=6;

    drawPlayer();
    drawEnemies();
    drawBullets();
    drawEnemyBullets();
    drawExplosions();

    document.getElementById("hp").innerText=player.hits;
    document.getElementById("weapon").innerText=player.weapon;

    requestAnimationFrame(update);
}

setInterval(spawnEnemy,1200);
update();
</script>
</body>
</html>
